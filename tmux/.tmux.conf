##### BASIC SETTINGS #####

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Faster ESC
set -sg escape-time 10

# Mouse support (scroll, select panes, resize)
set -g mouse on

# Larger scrollback
set -g history-limit 100000

# Use 256 colors
set -g default-terminal "screen-256color"

##### PANE TITLES / BORDERS #####

# Show a title bar for each pane (top border)
set -g pane-border-status top

# Format: pane index | current command | current path (trimmed)
set -g pane-border-format "#[fg=cyan]#{pane_index} #[fg=yellow]#{pane_current_command} #[fg=white]#{pane_current_path}"

# Give panes more descriptive titles based on running command
set -g allow-rename on

##### SPLITTING PANES #####

# Easy splits
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# Keep current path when splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### PANE NAVIGATION #####

# Move between panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift+Arrow (no prefix)
bind -n S-Left  resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Up    resize-pane -U 2
bind -n S-Down  resize-pane -D 2

##### WINDOW NAVIGATION #####

# Alt+Left/Right switches windows (no prefix)
bind-key -n M-Left  previous-window
bind-key -n M-Right next-window

##### STATUS BAR #####

set -g status-position bottom
set -g status-interval 5
set -g status-style bg=black,fg=white

set -g status-left-length 80
set -g status-right-length 160

# Left: session | window list info
set -g status-left "#[fg=green]#S #[fg=white]| #[fg=cyan]#(whoami)@#H #[fg=white]| "

# Middle: window list style
setw -g window-status-format "#[fg=white]#I:#W"
setw -g window-status-current-format "#[fg=yellow,bold]#I:#W"
setw -g window-status-separator "  "

# Right: prefix indicator + sysinfo + time
# Prefix indicator shows when you've hit Ctrl+b
set -g status-right "#{?client_prefix,#[bg=yellow]#[fg=black] PREFIX #[default] ,}#[fg=white]#(~/.dotfiles/bin/tmux_sysinfo) #[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "

##### KEY HINTS (SECOND STATUS LINE) #####
# A lightweight “cheat sheet” line below the main status bar.
# You can remove this if you find it too busy.
set -g status-format[1] "#[fg=white]Keys: #[fg=yellow]Ctrl+b #[fg=white]| Split #[fg=yellow]| - #[fg=white]| Move #[fg=yellow]h j k l #[fg=white]| Resize #[fg=yellow]Shift+Arrows #[fg=white]| Win #[fg=yellow]Alt← Alt→ #[fg=white]| Reload #[fg=yellow]prefix+r"
