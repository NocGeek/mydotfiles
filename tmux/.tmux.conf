##### BASIC SETTINGS #####

# reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# faster escape time
set -sg escape-time 10

# enable mouse support
set -g mouse on

# increase scrollback
set -g history-limit 100000

##### SPLITTING PANES #####

# easier splits
bind | split-window -h
bind - split-window -v

unbind '"'
unbind %

##### PANE NAVIGATION #####

# move between panes using vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### WINDOW NAVIGATION #####

bind-key -n M-Left previous-window
bind-key -n M-Right next-window

##### STATUS BAR #####

set -g status-position bottom
set -g status-interval 5

set -g status-style bg=black,fg=white

set -g status-left-length 60
set -g status-right-length 120

set -g status-left "#[fg=green]#S #[fg=white]| #I:#W"
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "

##### KEY HINTS #####

# Display common shortcuts in the bar
set -g status-format[1] \
"#(echo ' Prefix: Ctrl+b | Split: | - | Move: h j k l | Windows: Alt← Alt→ | Reload: prefix+r ')"

