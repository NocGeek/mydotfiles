##### BASIC SETTINGS #####
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
set -sg escape-time 10
set -g history-limit 100000
set -g default-terminal "screen-256color"

# Mouse on (you can toggle with Prefix+m)
set -g mouse on
bind m set -g mouse \; display-message "Mouse: #{?mouse,on,off}"

# Let tmux try to sync selections to system clipboard when possible
# (works best in modern terminals; harmless if unsupported)
set -g set-clipboard on

##### PANE TITLES / BORDERS #####
set -g pane-border-status top
set -g pane-border-format "#[fg=cyan]#{pane_index} #[fg=yellow]#{pane_current_command} #[fg=white]#{=40:#{s|$HOME|~|:pane_current_path}}"
set -g allow-rename on

##### SPLITTING PANES #####
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### PANE NAVIGATION #####
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n S-Left  resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Up    resize-pane -U 2
bind -n S-Down  resize-pane -D 2

##### WINDOW NAVIGATION #####
bind-key -n M-Left  previous-window
bind-key -n M-Right next-window

##### STATUS BAR (2 LINES) #####
set -g status 2
set -g status-position bottom
set -g status-interval 5
set -g status-style bg=black,fg=white
set -g status-left-length 90
set -g status-right-length 220

set -g status-left "#[fg=green]#S #[fg=white]| #[fg=cyan]#(whoami)@#H#[fg=magenta]#{?#{env:SSH_CONNECTION}, SSH,}#[fg=white] | "
setw -g window-status-format "#[fg=white]#I:#W"
setw -g window-status-current-format "#[fg=yellow,bold]#I:#W"
setw -g window-status-separator "  "

set -g status-right "#{?client_prefix,#[bg=yellow]#[fg=black] PREFIX #[default] ,}#[fg=green]#(cd \"#{pane_current_path}\" 2>/dev/null && git rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/^/git:/' | head -c 24)#[default] #[fg=white]#(~/.dotfiles/bin/tmux_sysinfo) #[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "
set -g status-format[1] "#[fg=white]Keys: #[fg=yellow]Ctrl+b #[fg=white]| Split #[fg=yellow]| - #[fg=white]| Move #[fg=yellow]h j k l #[fg=white]| Resize #[fg=yellow]Shift+Arrows #[fg=white]| Win #[fg=yellow]Alt← Alt→ #[fg=white]| Reload #[fg=yellow]prefix+r | Toggle mouse #[fg=yellow]prefix+m"
